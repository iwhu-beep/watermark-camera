name: Build IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: |
          # List available Xcode versions for debugging
          ls /Applications/ | grep Xcode || true
          sudo xcode-select -s /Applications/Xcode_16.4.app || sudo xcode-select -s /Applications/Xcode_16.3.app || sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode_16.1.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Resolve Swift Packages
        run: xcodebuild -resolvePackageDependencies -project CameraApp.xcodeproj -scheme CameraApp -sdk iphoneos

      - name: Build App
        run: |
          xcodebuild \
            -project CameraApp.xcodeproj \
            -scheme CameraApp \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER=com.watermarkcamera.app \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Sign and Package IPA
        run: |
          # Find the .app file
          APP_PATH=$(find build/DerivedData -name "CameraApp.app" -path "*/Release-iphoneos/*" | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app file not found"
            find build/DerivedData -name "*.app" || true
            exit 1
          fi
          
          echo "Found app: $APP_PATH"
          
          # Ad-hoc sign the app (required for TrollStore)
          codesign --force --sign - "$APP_PATH"
          
          # Create Payload directory
          mkdir -p build/ipa/Payload
          
          # Copy .app to Payload
          cp -R "$APP_PATH" build/ipa/Payload/
          
          # Zip as IPA
          cd build/ipa
          zip -r CameraApp.ipa Payload
          cd ../..
          
          echo "IPA created at build/ipa/CameraApp.ipa"
          ls -la build/ipa/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CameraApp-IPA
          path: build/ipa/CameraApp.ipa
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/ipa/CameraApp.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

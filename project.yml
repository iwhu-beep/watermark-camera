name: CameraApp
options:
  bundleIdPrefix: com.watermarkcamera
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"
    TARGETED_DEVICE_FAMILY: "1"

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.19
  SwiftSMTP:
    url: https://github.com/Kitura/Swift-SMTP.git
    from: 6.1.0

targets:
  CameraApp:
    type: application
    platform: iOS
    sources:
      - path: CameraApp
    dependencies:
      - package: ZIPFoundation
      - package: SwiftSMTP
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.watermarkcamera.app
        INFOPLIST_FILE: CameraApp/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "需要使用相机拍摄照片和视频"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "需要获取您的精确位置，用于在水印中记录经纬度信息"
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "需要获取您的精确位置，用于在水印中记录经纬度信息"
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "需要保存照片和视频到您的相册"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "需要访问相册以保存文件"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "需要使用麦克风录制视频音频"
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ACENT_COLOR: NO
        INFOPLIST_KEY_CFBundleDisplayName: "打卡相机"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    info:
      path: CameraApp/Info.plist
      properties:
        NSCameraUsageDescription: "需要使用相机拍摄照片和视频"
        NSLocationWhenInUseUsageDescription: "需要获取您的精确位置，用于在水印中记录经纬度信息"
        NSLocationAlwaysAndWhenInUseUsageDescription: "需要获取您的精确位置，用于在水印中记录经纬度信息"
        NSPhotoLibraryAddUsageDescription: "需要保存照片和视频到您的相册"
        NSPhotoLibraryUsageDescription: "需要访问相册以保存文件"
        NSMicrophoneUsageDescription: "需要使用麦克风录制视频音频"

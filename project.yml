name: CameraApp
options:
  bundleIdPrefix: com.watermarkcamera
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"
    TARGETED_DEVICE_FAMILY: "1"

packages:
  Alamofire:
    url: https://github.com/Alamofire/Alamofire.git
    from: "5.8.0"

targets:
  CameraApp:
    type: application
    platform: iOS
    sources:
      - path: CameraApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.watermarkcamera.app
        INFOPLIST_FILE: CameraApp/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: Alamofire
    info:
      path: CameraApp/Info.plist
